services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_BIND_IP:-127.0.0.1}:${DB_PORT_PUBLISH:-5431}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - private
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - private
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_BIND_IP:-127.0.0.1}:${MINIO_PORT:-9000}:9000"
      - "${MINIO_BIND_IP:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - private
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.bodycam-minio.rule=Host(`${MINIO_DOMAIN}`)
      - traefik.http.routers.bodycam-minio.entrypoints=websecure
      - traefik.http.routers.bodycam-minio.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-le}
      - traefik.http.services.bodycam-minio.loadbalancer.server.port=9000
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit/livekit.yaml
    ports:
      - "${LIVEKIT_SIGNAL_BIND_IP:-127.0.0.1}:${LIVEKIT_PORT:-7880}:7880"
      - "${LIVEKIT_BIND_IP:-0.0.0.0}:${LIVEKIT_RTC_TCP_PORT:-7881}:7881"
      - "${LIVEKIT_UDP_PORT_RANGE:-50000-50100}:50000-50100/udp"
    volumes:
      - ../../livekit.prod.generated.yaml:/etc/livekit/livekit.yaml:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - private
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.bodycam-livekit.rule=Host(`${LIVEKIT_DOMAIN}`)
      - traefik.http.routers.bodycam-livekit.entrypoints=websecure
      - traefik.http.routers.bodycam-livekit.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-le}
      - traefik.http.services.bodycam-livekit.loadbalancer.server.port=7880
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep [l]ivekit >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  coturn:
    image: coturn/coturn:latest
    command:
      - -n
      - --log-file=stdout
      - --external-ip=${TURN_EXTERNAL_IP}
      - --realm=${TURN_REALM}
      - --lt-cred-mech
      - --user=${TURN_USERNAME}:${TURN_PASSWORD}
    ports:
      - "${TURN_BIND_IP:-0.0.0.0}:${TURN_PORT:-3478}:3478"
      - "${TURN_BIND_IP:-0.0.0.0}:${TURN_PORT:-3478}:3478/udp"
    networks:
      - private
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep [t]urnserver >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

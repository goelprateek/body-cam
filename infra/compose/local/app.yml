services:
  backend:
    build:
      context: ../../../backend
      dockerfile: Dockerfile
    env_file:
      - ../../../backend/.env.docker.local
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      livekit:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://127.0.0.1:8080/actuator/health || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ../../../frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-8081}:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

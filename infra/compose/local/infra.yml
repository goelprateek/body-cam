services:
  livekit-config:
    image: bash:5.2
    command:
      - /repo/scripts/deploy/render-livekit-config.sh
      - /repo
      - infra/.env.local
      - backend/.env.local
      - /work/livekit.yaml
    volumes:
      - ../../../:/repo:ro
      - livekit_config:/work
    restart: "no"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://127.0.0.1:9000/minio/health/live",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  vosk:
    image: ${TRANSCRIPT_IMAGE:-alphacep/kaldi-en:latest}
    ports:
      - "${TRANSCRIPT_PORT:-2700}:2700"
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit/livekit.yaml
    ports:
      - "${LIVEKIT_PORT:-7880}:7880"
      - "${LIVEKIT_RTC_TCP_PORT:-7881}:7881"
      - "${LIVEKIT_UDP_PORT_RANGE:-50000-50100}:${LIVEKIT_UDP_PORT_RANGE:-50000-50100}/udp"
    depends_on:
      livekit-config:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - livekit_config:/etc/livekit:ro
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep [l]ivekit >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  coturn:
    image: coturn/coturn:latest
    command:
      - -n
      - --log-file=stdout
      - --external-ip=${TURN_EXTERNAL_IP}/${TURN_INTERNAL_IP}
      - --realm=${TURN_REALM}
      - --lt-cred-mech
      - --user=${TURN_USERNAME}:${TURN_PASSWORD}
      - --relay-ip=${TURN_INTERNAL_IP}
    ports:
      - "${TURN_PORT:-3478}:3478"
      - "${TURN_PORT:-3478}:3478/udp"
    networks:
      default:
        ipv4_address: ${TURN_INTERNAL_IP}
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep [t]urnserver >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

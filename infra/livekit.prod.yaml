port: 7880
bind_addresses:
  - ""
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50100
  # LiveKit runs behind Docker bridge networking in production here, so it must
  # discover and advertise the host's public IP for browser and mobile ICE.
  use_external_ip: true
  turn_servers:
    - host: turn-bodycam.idti.dev
      port: 3478
      protocol: udp
      username: replace-me-turn-user
      credential: replace-me-turn-password
    - host: turn-bodycam.idti.dev
      port: 3478
      protocol: tcp
      username: replace-me-turn-user
      credential: replace-me-turn-password
redis:
  address: redis:6379
keys:
  replace-me-livekit-key: replace-me-livekit-secret

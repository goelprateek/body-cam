spring:
  application:
    name: bodycam-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:bodycam}
    username: ${DB_USER:bodycam}
    password: ${DB_PASSWORD:bodycam}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    issuer: bodycam-backend
    secret: ${APP_JWT_SECRET:}
    access-token-minutes: 480
  livekit:
    url: ${LIVEKIT_URL:ws://livekit:7880}
    public-url: ${LIVEKIT_PUBLIC_URL:ws://10.0.2.2:7880}
    api-key: ${LIVEKIT_API_KEY:devkey}
    api-secret: ${LIVEKIT_API_SECRET:secret}
  storage:
    endpoint: ${MINIO_ENDPOINT:http://minio:9000}
    public-url: ${MINIO_PUBLIC_URL:http://10.0.2.2:9000}
    bucket: ${MINIO_BUCKET:recordings}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}

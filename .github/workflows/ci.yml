name: CI

on:
  workflow_call:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Run backend tests
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon test

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  infra:
    name: Compose Render Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare backend env files for compose render
        shell: bash
        run: |
          cp backend/.env.prod.example backend/.env.prod

      - name: Render local compose
        working-directory: infra
        run: docker compose --env-file .env.local.example -f docker-compose.yml config

      - name: Render production compose
        working-directory: infra
        run: docker compose --env-file .env.prod.example -f docker-compose.prod.yml config

      - name: Render and validate LiveKit production config
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/deploy/render-livekit-config.sh "$GITHUB_WORKSPACE" infra/.env.prod.example backend/.env.prod scripts/deploy/livekit.test.generated.yaml
          bash scripts/deploy/validate-livekit-config.sh "$GITHUB_WORKSPACE" infra/.env.prod.example backend/.env.prod scripts/deploy/livekit.test.generated.yaml

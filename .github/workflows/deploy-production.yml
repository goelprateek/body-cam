name: Deploy Production

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - ".github/workflows/deploy-production.yml"
      - "backend/**"
      - "frontend/**"
      - "infra/**"
      - "scripts/deploy/**"
  workflow_dispatch:
    inputs:
      release_label:
        description: "Optional image tag override. Defaults to commit-<commit>."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  ci:
    name: Validate Changes
    uses: ./.github/workflows/ci.yml

  build_and_push:
    name: Build And Push Images
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      release_label: ${{ steps.release_meta.outputs.release_label }}
      backend_image_ref: ${{ steps.image_refs.outputs.backend_image_ref }}
      frontend_image_ref: ${{ steps.image_refs.outputs.frontend_image_ref }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Calculate release metadata
        id: release_meta
        shell: bash
        env:
          CONTAINER_REGISTRY: ${{ vars.CONTAINER_REGISTRY }}
        run: |
          set -euo pipefail

          if [[ -z "${CONTAINER_REGISTRY:-}" ]]; then
            echo "Repository variable CONTAINER_REGISTRY is required." >&2
            exit 1
          fi

          if [[ -n "${{ github.event.inputs.release_label || '' }}" ]]; then
            release_label="${{ github.event.inputs.release_label }}"
          else
            release_label="commit-${GITHUB_SHA::12}"
          fi

          backend_tags="${CONTAINER_REGISTRY}/body-cam-backend:${release_label}"
          frontend_tags="${CONTAINER_REGISTRY}/body-cam-frontend:${release_label}"

          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            backend_tags+=$'\n'"${CONTAINER_REGISTRY}/body-cam-backend:latest"
            frontend_tags+=$'\n'"${CONTAINER_REGISTRY}/body-cam-frontend:latest"
          fi

          {
            echo "release_label=${release_label}"
            echo "backend_tags<<EOF"
            echo "${backend_tags}"
            echo "EOF"
            echo "frontend_tags<<EOF"
            echo "${frontend_tags}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        shell: bash
        env:
          CONTAINER_REGISTRY: ${{ vars.CONTAINER_REGISTRY }}
        run: |
          set -euo pipefail
          registry_name="${CONTAINER_REGISTRY##*/}"
          doctl registries login "${registry_name}" --expiry-seconds 1200

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        id: build_backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.release_meta.outputs.backend_tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push frontend image
        id: build_frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.release_meta.outputs.frontend_tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Capture immutable image references
        id: image_refs
        shell: bash
        env:
          CONTAINER_REGISTRY: ${{ vars.CONTAINER_REGISTRY }}
        run: |
          set -euo pipefail
          echo "backend_image_ref=${CONTAINER_REGISTRY}/body-cam-backend@${{ steps.build_backend.outputs.digest }}" >> "${GITHUB_OUTPUT}"
          echo "frontend_image_ref=${CONTAINER_REGISTRY}/body-cam-frontend@${{ steps.build_frontend.outputs.digest }}" >> "${GITHUB_OUTPUT}"

  deploy:
    name: Deploy To Production
    runs-on: ubuntu-latest
    needs: build_and_push
    environment:
      name: production
    env:
      APP_DIR: ${{ vars.APP_DIR }}
      CONTAINER_REGISTRY: ${{ vars.CONTAINER_REGISTRY }}
      SSH_HOST: ${{ vars.SSH_HOST }}
      SSH_PORT: ${{ vars.SSH_PORT }}
      SSH_USER: ${{ vars.SSH_USER }}
      DEPLOY_ENV_FILE: ${{ vars.DEPLOY_ENV_FILE }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate production variables
        shell: bash
        env:
          DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          required_vars=(
            APP_DIR
            CONTAINER_REGISTRY
            SSH_HOST
            SSH_PORT
            SSH_USER
            DEPLOY_ENV_FILE
            DIGITALOCEAN_ACCESS_TOKEN
            SSH_PRIVATE_KEY
            SSH_KNOWN_HOSTS
          )

          for var_name in "${required_vars[@]}"; do
            if [[ -z "${!var_name:-}" ]]; then
              echo "Required production configuration ${var_name} is missing." >&2
              exit 1
            fi
          done

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Configure SSH known hosts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Ensure remote deployment directory exists
        shell: bash
        run: |
          set -euo pipefail
          ssh -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" "mkdir -p '${APP_DIR}'"

      - name: Sync deployment assets to server
        shell: bash
        run: |
          set -euo pipefail
          rsync -az --delete \
            -e "ssh -p ${SSH_PORT}" \
            infra/docker-compose.prod.yml \
            infra/compose \
            infra/livekit.yaml \
            scripts \
            "${SSH_USER}@${SSH_HOST}:${APP_DIR}/"

      - name: Run production deploy
        shell: bash
        env:
          DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          RELEASE_LABEL: ${{ needs.build_and_push.outputs.release_label }}
          RELEASE_BACKEND_IMAGE_REF: ${{ needs.build_and_push.outputs.backend_image_ref }}
          RELEASE_FRONTEND_IMAGE_REF: ${{ needs.build_and_push.outputs.frontend_image_ref }}
        run: |
          set -euo pipefail
          {
            printf 'export APP_DIR=%q\n' "${APP_DIR}"
            printf 'export CONTAINER_REGISTRY=%q\n' "${CONTAINER_REGISTRY}"
            printf 'export PRODUCTION_ENV_FILE=%q\n' "${DEPLOY_ENV_FILE}"
            printf 'export RELEASE_LABEL=%q\n' "${RELEASE_LABEL}"
            printf 'export BACKEND_IMAGE_REF=%q\n' "${RELEASE_BACKEND_IMAGE_REF}"
            printf 'export FRONTEND_IMAGE_REF=%q\n' "${RELEASE_FRONTEND_IMAGE_REF}"
            printf 'export DIGITALOCEAN_ACCESS_TOKEN=%q\n' "${DIGITALOCEAN_ACCESS_TOKEN}"
            printf 'cd "$APP_DIR"\n'
            printf 'sed -i "s/\\r$//" scripts/deploy/production-deploy.sh\n'
            printf 'bash scripts/deploy/production-deploy.sh\n'
          } | ssh -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" "bash -se"

      - name: Read production verification targets
        id: verification_targets
        shell: bash
        run: |
          set -euo pipefail

          remote_env="$(
            ssh -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" \
              "cd '${APP_DIR}' && grep -E '^(FRONTEND_DOMAIN|API_DOMAIN)=' '${DEPLOY_ENV_FILE}' || true"
          )"

          while IFS='=' read -r key value; do
            case "${key}" in
              FRONTEND_DOMAIN) echo "frontend_domain=${value}" >> "${GITHUB_OUTPUT}" ;;
              API_DOMAIN) echo "api_domain=${value}" >> "${GITHUB_OUTPUT}" ;;
            esac
          done <<< "${remote_env}"

      - name: Verify production frontend publicly
        if: steps.verification_targets.outputs.frontend_domain != ''
        id: verify_frontend
        shell: bash
        env:
          FRONTEND_DOMAIN: ${{ steps.verification_targets.outputs.frontend_domain }}
        run: |
          set -euo pipefail
          body="$(curl --fail --silent --show-error --location --retry 10 --retry-delay 10 "https://${FRONTEND_DOMAIN}/")"
          if ! grep -Eiq 'Body Cam|<app-root' <<< "${body}"; then
            echo "Public frontend verification did not find the expected application marker." >&2
            exit 1
          fi

      - name: Verify production backend health publicly
        if: steps.verification_targets.outputs.api_domain != ''
        id: verify_backend
        shell: bash
        env:
          API_DOMAIN: ${{ steps.verification_targets.outputs.api_domain }}
        run: |
          set -euo pipefail
          body="$(curl --fail --silent --show-error --location --retry 10 --retry-delay 10 "https://${API_DOMAIN}/actuator/health")"
          if ! grep -Eiq '"status"\s*:\s*"(UP|up|OK|ok)"' <<< "${body}"; then
            echo "Public backend verification did not return the expected health response." >&2
            exit 1
          fi

      - name: Roll back production deployment after failed public verification
        if: failure() && (steps.verify_frontend.outcome == 'failure' || steps.verify_backend.outcome == 'failure')
        shell: bash
        env:
          DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          {
            printf 'export APP_DIR=%q\n' "${APP_DIR}"
            printf 'export CONTAINER_REGISTRY=%q\n' "${CONTAINER_REGISTRY}"
            printf 'export PRODUCTION_ENV_FILE=%q\n' "${DEPLOY_ENV_FILE}"
            printf 'export DIGITALOCEAN_ACCESS_TOKEN=%q\n' "${DIGITALOCEAN_ACCESS_TOKEN}"
            printf 'export DEPLOY_ACTION=%q\n' "rollback-last-successful"
            printf 'cd "$APP_DIR"\n'
            printf 'sed -i "s/\\r$//" scripts/deploy/production-deploy.sh\n'
            printf 'bash scripts/deploy/production-deploy.sh\n'
          } | ssh -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" "bash -se"
